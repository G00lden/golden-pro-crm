services:
  crm:
    image: golden-pro-crm:runtime
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        VITE_DATA_PROVIDER: ${VITE_DATA_PROVIDER:-sqlite}
        VITE_DB_PROVIDER: ${VITE_DB_PROVIDER:-sqlite}
        VITE_LOCAL_AUTH: ${VITE_LOCAL_AUTH:-false}
        VITE_PUBLIC_CONTACT_PHONE: ${VITE_PUBLIC_CONTACT_PHONE:-}
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      # The deploy command must override any stale BUILD_COMMIT left in the
      # env file so /api/health identifies the exact packaged source.
      BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:3000:8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - crm_data:/app/data
      - crm_runtime:/app/.runtime
      - crm_wa_session:/app/.wa-session

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - crm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CRM_DOMAIN: ${CRM_DOMAIN:-crm.breexe-pro.com}
      ERP_DOMAIN: ${ERP_DOMAIN:-erp.breexe-pro.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  crm_data:
  crm_runtime:
  crm_wa_session:
  caddy_data:
    name: ${CADDY_DATA_VOLUME:-deploy_caddy_data}
  caddy_config:
    name: ${CADDY_CONFIG_VOLUME:-deploy_caddy_config}
