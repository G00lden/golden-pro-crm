services:
  crm:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - crm_runtime:/app/.runtime
      - crm_wa_session:/app/.wa-session

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - crm
    environment:
      CRM_DOMAIN: ${CRM_DOMAIN:-crm.breexe-pro.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  crm_runtime:
  crm_wa_session:
  caddy_data:
  caddy_config:
