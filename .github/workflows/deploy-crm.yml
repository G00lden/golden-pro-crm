name: Deploy CRM to crm.breexe-pro.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Smoke test
        run: npm run test:smoke

      - name: Build Docker
        run: docker build -t golden-pro-crm .

      - name: Deploy to VPS
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "
            cd /opt/golden-pro-crm &&
            git fetch origin main &&
            git reset --hard origin/main &&
            npm ci &&
            npm run build &&
            docker build -t golden-pro-crm . &&
            docker stop golden-crm 2>/dev/null || true &&
            docker rm golden-crm 2>/dev/null || true &&
            docker run -d --name golden-crm --restart always \
              -p 127.0.0.1:3000:8080 \
              --env-file /opt/golden-pro-crm/.env \
              --mount type=bind,src=/opt/golden-pro-crm/.wa-session,dst=/app/.wa-session \
              golden-pro-crm
          "
