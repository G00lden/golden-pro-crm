name: Auto-deploy to crm.breexe-pro.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and deploy
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && echo "$KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${USER}@${HOST} "
            cd /opt/golden-pro-crm &&
            git fetch origin main &&
            git reset --hard origin/main &&
            npm ci --omit=dev &&
            npm run build &&
            pm2 restart golden-crm || pm2 start npm --name golden-crm -- start
          "
