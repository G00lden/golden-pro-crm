name: CI

# Type-check, test, and build every release candidate before deployment.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Unit and deployment transaction tests
        run: npm run test:unit

      - name: Build
        run: npm run build
